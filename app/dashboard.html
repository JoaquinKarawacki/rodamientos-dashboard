<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rodamientos — SEG Ingeniería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1017;
      --surface:   #161b27;
      --surface-2: #1d2336;
      --border:    #272f45;
      --text:      #dde3f0;
      --muted:     #7b869c;
      --accent:    #38bdf8;

      --cat-a:  #22c55e;
      --cat-b:  #eab308;
      --cat-c:  #f97316;
      --cat-d:  #ef4444;
      --cat-nd: #6b7280;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo svg { display: block; }

    .header-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-title span { color: var(--muted); font-weight: 400; }

    .park-selector {
      display: flex;
      gap: 4px;
      background: var(--surface-2);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .park-btn {
      padding: 5px 16px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .park-btn.active {
      background: var(--accent);
      color: #0d1017;
    }

    .park-btn:hover:not(.active) { color: var(--text); }

    /* ── TABS NAV ────────────────────────────────────────────── */
    .tabs-nav {
      flex-shrink: 0;
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: var(--surface);
    }

    .tab-btn {
      padding: 13px 18px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }

    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── TAB PANELS ─────────────────────────────────────────── */
    .tab-panels {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .tab-panel.active { display: block; }

    #tab-turbina {
      overflow: hidden;
      padding: 16px;
    }

    /* ── UTILITIES ──────────────────────────────────────────── */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .loading {
      padding: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      padding: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .cat-a { color: var(--cat-a); }
    .cat-b { color: var(--cat-b); }
    .cat-c { color: var(--cat-c); }
    .cat-d { color: var(--cat-d); }
    .cat-nd { color: var(--cat-nd); }

    /* ── COUNTER CARDS ──────────────────────────────────────── */
    .counters-row {
      margin-bottom: 20px;
    }

    .counters-group {
      display: flex;
      gap: 10px;
    }

    .counter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      flex: 1;
      min-width: 80px;
      border-left-width: 3px;
    }

    .counter-card .count {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .counter-card .label {
      font-size: 12px;
      color: var(--muted);
    }

    .counter-card.cc-a { border-left-color: var(--cat-a); }
    .counter-card.cc-b { border-left-color: var(--cat-b); }
    .counter-card.cc-c { border-left-color: var(--cat-c); }
    .counter-card.cc-d { border-left-color: var(--cat-d); }

    /* ── CHART BOX ──────────────────────────────────────────── */
    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .chart-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── MAPA ESTADO ────────────────────────────────────────── */
    .turbinas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }

    .turbina-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .turbina-card:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }

    .turbina-card .t-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }

    .t-badges {
      display: flex;
      gap: 6px;
    }

    .t-badge {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .t-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
    }

    .t-dot.da { background: rgba(34,197,94,.15); color: var(--cat-a); border: 1px solid rgba(34,197,94,.3); }
    .t-dot.db { background: rgba(234,179,8,.15); color: var(--cat-b); border: 1px solid rgba(234,179,8,.3); }
    .t-dot.dc { background: rgba(249,115,22,.15); color: var(--cat-c); border: 1px solid rgba(249,115,22,.3); }
    .t-dot.dd { background: rgba(239,68,68,.15); color: var(--cat-d); border: 1px solid rgba(239,68,68,.3); }
    .t-dot.dnd { background: rgba(107,114,128,.15); color: var(--cat-nd); border: 1px solid rgba(107,114,128,.3); }

    .t-dot-label {
      font-size: 10px;
      color: var(--muted);
    }

    /* ── POR TURBINA ────────────────────────────────────────── */
    .turbina-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 14px;
      height: 100%;
    }

    .turbina-sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow-y: auto;
    }

    .sidebar-item {
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }

    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item:hover { background: var(--surface-2); }
    .sidebar-item.active {
      background: var(--surface-2);
      border-left-color: var(--accent);
      color: var(--accent);
    }

    .sidebar-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .turbina-detail {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    /* status header */
    .t-status-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .t-status-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .t-status-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .t-status-badge strong {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .t-status-date {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    /* inspection table */
    .insp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .insp-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .insp-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
    }

    .insp-table tr:last-child td { border-bottom: none; }

    .insp-table tr:hover td { background: var(--surface-2); }

    /* ── ADMIN ──────────────────────────────────────────────── */
    .admin-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      max-width: 1100px;
    }

    .admin-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-select, .form-file {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-select:focus, .form-file:focus {
      border-color: var(--accent);
    }

    .form-file {
      padding: 6px 10px;
      cursor: pointer;
    }

    .form-file::file-selector-button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d1017;
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-feedback {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      display: none;
    }

    .form-feedback.ok {
      display: block;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      color: var(--cat-a);
    }

    .form-feedback.err {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--cat-d);
    }

    .cargas-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .cargas-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .cargas-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .cargas-table tr:last-child td { border-bottom: none; }
    .cargas-table tr:hover td { background: var(--surface-2); }

    .estado-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
    }

    .estado-exitosa  { background: rgba(34,197,94,.1);  color: var(--cat-a); border: 1px solid rgba(34,197,94,.25); }
    .estado-revertida{ background: rgba(107,114,128,.1); color: var(--muted); border: 1px solid rgba(107,114,128,.25); }
    .estado-fallida  { background: rgba(239,68,68,.1);  color: var(--cat-d); border: 1px solid rgba(239,68,68,.25); }

    .btn-revertir {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .btn-revertir:hover {
      border-color: var(--cat-d);
      color: var(--cat-d);
    }

    /* ── FILTER BAR ─────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-bar-label {
      font-size: 11px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .filter-sep {
      font-size: 12px;
      color: var(--muted);
    }

    .filter-input-month {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s;
      color-scheme: dark;
    }

    .filter-input-month:focus { border-color: var(--accent); }

    .btn-filter-clear {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .btn-filter-clear:hover { border-color: var(--accent); color: var(--accent); }

    .turbina-bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .t-warn-total {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 20px;
      padding: 3px 12px;
      letter-spacing: 0.04em;
    }

    .t-tipo-pill {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 9px;
      background: var(--surface-2);
      border: 1px solid;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2" fill="#0d1017"/>
          <path d="M8 2 L9 6 L7 6 Z" fill="#0d1017"/>
          <path d="M13.5 11 L10 8.5 L11 6.7 Z" fill="#0d1017"/>
          <path d="M2.5 11 L6 8.5 L5 6.7 Z" fill="#0d1017"/>
        </svg>
      </div>
      <div class="header-title">SEG Ingeniería <span>/</span> Rodamientos</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="park-selector" id="parkSelector"></div>
      <a id="btn-exportar" href="#" target="_blank"
         style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;text-decoration:none;transition:all 0.15s"
         onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
         onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M7 2v7M4 6l3 3 3-3M2 10v1a1 1 0 001 1h8a1 1 0 001-1v-1"/>
        </svg>
        Exportar HTML
      </a>
    </div>
  </header>

  <!-- TABS -->
  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="resumen">Resumen</button>
    <button class="tab-btn" data-tab="mapa">Mapa Estado</button>
    <button class="tab-btn" data-tab="turbina">Por Turbina</button>
    <button class="tab-btn" data-tab="admin">Administración</button>
  </nav>

  <!-- TAB PANELS -->
  <div class="tab-panels">

    <div id="tab-resumen" class="tab-panel active">
      <div id="resumen-content"><div class="loading">Cargando...</div></div>
    </div>

    <div id="tab-mapa" class="tab-panel">
      <div id="mapa-content"><div class="loading">Cargando...</div></div>
    </div>

    <div id="tab-turbina" class="tab-panel">
      <div class="turbina-layout">
        <div class="turbina-sidebar" id="turbina-sidebar">
          <div class="loading">Cargando...</div>
        </div>
        <div class="turbina-detail" id="turbina-detail">
          <div class="empty">Seleccioná una turbina para ver el detalle.</div>
        </div>
      </div>
    </div>

    <div id="tab-admin" class="tab-panel">
      <div class="admin-layout">

        <div class="admin-form">
          <div class="section-label">Cargar archivo</div>

          <div class="form-group">
            <label class="form-label">Parque</label>
            <select id="admin-parque" class="form-select"></select>
          </div>

          <div class="form-group">
            <label class="form-label">Tipo de carga</label>
            <select id="admin-tipo" class="form-select" onchange="onTipoCambio()">
              <option value="control_mensual">Control mensual (hoja X)</option>
              <option value="logbook">Logbook ROTORsoft</option>
              <option value="seed_rodamientos">Seed rodamientos (primera vez)</option>
              <option value="seed_warnings">Seed warnings Peralta (primera vez)</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Archivo Excel</label>
            <input type="file" id="admin-archivo" class="form-file" accept=".xlsx,.xls">
          </div>

          <button class="btn-primary" id="admin-submit" onclick="subirArchivo()">Cargar</button>
          <div class="form-feedback" id="admin-feedback"></div>
        </div>

        <div class="chart-box">
          <div class="chart-title">Historial de cargas</div>
          <div id="admin-cargas"><div class="loading">Cargando...</div></div>
        </div>

      </div>
    </div>

  </div>

  <script>
    const API = 'https://rodamientos-dashboard-production.up.railway.app';

    const MESES = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    const CAT_COLORS = {
      A: '#22c55e', B: '#eab308', C: '#f97316', D: '#ef4444', ND: '#6b7280'
    };

    const TYPE_COLORS = ['#38bdf8','#818cf8','#f472b6','#34d399','#fb923c','#a78bfa','#fbbf24'];

    let parques = [];
    let parqueActual = null;
    let turbinaActivaId = null;
    let turbinaActivaCodigo = null;
    let resumenDataRaw = null;
    let turbinaDataRaw = null;

    // ── PLOTLY CONFIG ──────────────────────────────────────────

    function plotlyLayout(extra = {}) {
      return {
        paper_bgcolor: 'transparent',
        plot_bgcolor: 'transparent',
        font: { color: '#dde3f0', family: 'Inter, sans-serif', size: 11 },
        xaxis: { gridcolor: '#272f45', color: '#7b869c', linecolor: '#272f45', tickfont: { size: 11 } },
        yaxis: { gridcolor: '#272f45', color: '#7b869c', linecolor: '#272f45', zeroline: false, tickfont: { size: 11 } },
        margin: { t: 8, r: 12, b: 44, l: 40 },
        legend: { bgcolor: 'transparent', bordercolor: 'transparent', font: { size: 11 } },
        ...extra
      };
    }

    const plotlyConfig = { responsive: true, displayModeBar: false };

    // ── HELPERS ───────────────────────────────────────────────

    function dotClass(cat) {
      const c = (cat || 'ND').toUpperCase();
      return { A: 'da', B: 'db', C: 'dc', D: 'dd' }[c] || 'dnd';
    }

    function catClass(cat) {
      return 'cat-' + (cat || 'nd').toLowerCase();
    }

    function worstCat(a, b) {
      const order = { D: 4, C: 3, B: 2, A: 1, ND: 0 };
      return (order[a] || 0) >= (order[b] || 0) ? a : b;
    }

    function mesLabel(mes, anio) {
      return `${MESES[mes]} ${anio}`;
    }

    // ── FILTRO DE FECHA ───────────────────────────────────────

    function parseMes(str) {
      if (!str) return null;
      const [anio, mes] = str.split('-').map(Number);
      return [anio, mes];
    }

    function mesKey(anio, mes) { return anio * 100 + mes; }

    function filtrarPorRango(arr, desdeStr, hastaStr) {
      const desde = parseMes(desdeStr);
      const hasta = parseMes(hastaStr);
      if (!desde && !hasta) return arr;
      return arr.filter(w => {
        if (w.mes == null || w.anio == null) return false;
        const k = mesKey(w.anio, w.mes);
        if (desde && k < mesKey(desde[0], desde[1])) return false;
        if (hasta && k > mesKey(hasta[0], hasta[1])) return false;
        return true;
      });
    }

    function agregarPorTipo(arr) {
      const m = {};
      arr.forEach(w => { m[w.tipo] = (m[w.tipo] || 0) + w.cantidad; });
      return Object.entries(m)
        .map(([tipo, total]) => ({ tipo, total }))
        .sort((a, b) => a.tipo.localeCompare(b.tipo));
    }

    function rangoStr(arr) {
      let min = null, max = null;
      arr.forEach(w => {
        if (w.mes == null || w.anio == null) return;
        const k = mesKey(w.anio, w.mes);
        if (min === null || k < mesKey(min[0], min[1])) min = [w.anio, w.mes];
        if (max === null || k > mesKey(max[0], max[1])) max = [w.anio, w.mes];
      });
      const fmt = v => v ? `${v[0]}-${String(v[1]).padStart(2,'0')}` : '';
      return { min: fmt(min), max: fmt(max) };
    }

    function filterBarHTML(idDesde, idHasta, min, max) {
      return `
        <div class="filter-bar">
          <span class="filter-bar-label">Periodo</span>
          <span class="filter-sep">Desde</span>
          <input type="month" class="filter-input-month" id="${idDesde}"
                 min="${min}" max="${max}"
                 onchange="onFiltroChange('${idDesde}','${idHasta}')">
          <span class="filter-sep">Hasta</span>
          <input type="month" class="filter-input-month" id="${idHasta}"
                 min="${min}" max="${max}"
                 onchange="onFiltroChange('${idDesde}','${idHasta}')">
          <button class="btn-filter-clear"
                  onclick="limpiarFiltro('${idDesde}','${idHasta}')">Limpiar</button>
        </div>`;
    }

    function limpiarFiltro(idDesde, idHasta) {
      document.getElementById(idDesde).value = '';
      document.getElementById(idHasta).value = '';
      onFiltroChange(idDesde, idHasta);
    }

    function onFiltroChange(idDesde, idHasta) {
      const desde = document.getElementById(idDesde).value;
      const hasta = document.getElementById(idHasta).value;
      if (idDesde === 'filter-desde-resumen') renderNoACharts(desde, hasta);
      else renderTurbinaCharts(desde, hasta);
    }

    function rellenarMeses(arr, campo) {
      // Rellena con 0 los meses faltantes entre el min y max del array,
      // para que la línea temporal sea continua aunque no haya warnings.
      if (arr.length === 0) return [];
      const lookup = {};
      arr.forEach(w => { lookup[mesKey(w.anio, w.mes)] = w[campo]; });
      const keys = arr.map(w => mesKey(w.anio, w.mes));
      const minK = Math.min(...keys);
      const maxK = Math.max(...keys);
      const result = [];
      let anio = Math.floor(minK / 100);
      let mes  = minK % 100;
      while (mesKey(anio, mes) <= maxK) {
        result.push({ mes, anio, [campo]: lookup[mesKey(anio, mes)] ?? 0 });
        mes++;
        if (mes > 12) { mes = 1; anio++; }
      }
      return result;
    }

    function abrevTipo(tipo) {
      return tipo.split(/[\s.]/)[0];
    }

    function tipoConFechaAgrupar(arr) {
      const m = {};
      arr.forEach(w => {
        if (w.mes == null || w.anio == null) return;
        const key = `${w.tipo}|${w.anio}|${w.mes}`;
        if (!m[key]) m[key] = { tipo: w.tipo, mes: w.mes, anio: w.anio, cantidad: 0 };
        m[key].cantidad += w.cantidad;
      });
      return Object.values(m);
    }

    // ── INIT ──────────────────────────────────────────────────

    async function init() {
      try {
        const res = await fetch(`${API}/parques/`);
        parques = await res.json();

        const sel = document.getElementById('parkSelector');
        parques.forEach((p, i) => {
          const btn = document.createElement('button');
          btn.className = 'park-btn' + (i === 0 ? ' active' : '');
          btn.textContent = p.nombre;
          btn.dataset.codigo = p.codigo;
          btn.addEventListener('click', () => selectParque(p));
          sel.appendChild(btn);
        });

        selectParque(parques[0]);
      } catch (e) {
        document.getElementById('resumen-content').innerHTML =
          `<div class="empty">No se pudo conectar a la API. ¿Está corriendo uvicorn?</div>`;
      }
    }

    function selectParque(parque) {
      parqueActual = parque;
      document.querySelectorAll('.park-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.codigo === parque.codigo)
      );
      document.getElementById('btn-exportar').href = `${API}/exportar/${parque.codigo}`;
      loadCurrentTab();
    }

    // ── TABS ──────────────────────────────────────────────────

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        loadCurrentTab();
      });
    });

    function getActiveTab() {
      return document.querySelector('.tab-btn.active')?.dataset.tab;
    }

    function loadCurrentTab() {
      const tab = getActiveTab();
      if (tab === 'resumen') loadResumen();
      else if (tab === 'mapa') loadMapa();
      else if (tab === 'turbina') loadTurbinasSidebar();
      else if (tab === 'admin') loadAdmin();
    }

    // ── RESUMEN ───────────────────────────────────────────────

    async function loadResumen() {
      const el = document.getElementById('resumen-content');
      el.innerHTML = '<div class="loading">Cargando...</div>';

      const res = await fetch(`${API}/resumen/${parqueActual.codigo}`);
      const data = await res.json();
      resumenDataRaw = data;

      const { contadores, warnings_por_mes, warnings_por_tipo } = data;
      const rango = rangoStr([...warnings_por_mes, ...warnings_por_tipo]);

      function renderCounterGroup(obj, titulo) {
        const cats = ['A','B','C','D'];
        return `
          <div class="counters-row">
            <div class="section-label">${titulo}</div>
            <div class="counters-group">
              ${cats.map(c => `
                <div class="counter-card cc-${c.toLowerCase()}">
                  <div class="count cat-${c.toLowerCase()}">${obj[c] || 0}</div>
                  <div class="label">Cat. ${c}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      el.innerHTML = `
        ${renderCounterGroup(contadores.delantera, 'Rodamiento Delantero')}
        ${renderCounterGroup(contadores.trasera, 'Rodamiento Trasero')}
        <div style="margin-top:8px">
          ${filterBarHTML('filter-desde-resumen', 'filter-hasta-resumen', rango.min, rango.max)}
          <div class="chart-box" style="margin-top:8px">
            <div class="chart-title">Rodamiento Delantero ≠ A — Warnings histórico por tipo</div>
            <div id="chart-del-no-a" style="height:320px"></div>
          </div>
          <div class="chart-box" style="margin-top:8px">
            <div class="chart-title">Rodamiento Trasero ≠ A — Warnings histórico por tipo</div>
            <div id="chart-tras-no-a" style="height:320px"></div>
          </div>
        </div>
      `;

      renderNoACharts('', '');
    }

    function renderNoACharts(desdeStr = '', hastaStr = '') {
      if (!resumenDataRaw) return;
      const { warnings_detalle_turbinas } = resumenDataRaw;
      buildNoAChart(warnings_detalle_turbinas || [], 'categoria_delantera', 'chart-del-no-a', desdeStr, hastaStr);
      buildNoAChart(warnings_detalle_turbinas || [], 'categoria_trasera',   'chart-tras-no-a', desdeStr, hastaStr);
    }

    function buildNoAChart(turbinas, catKey, containerId, desdeStr = '', hastaStr = '') {
      const el = document.getElementById(containerId);
      if (!el) return;

      const filtered = turbinas.filter(t => t[catKey] !== 'A');
      if (!filtered.length) {
        Plotly.purge(containerId);
        el.innerHTML = '<div class="empty" style="padding:30px">Todas las turbinas en Cat. A</div>';
        return;
      }

      // ── Rango completo de meses (uniforme para todos los WECs) ──
      const dataMonths = filtered.flatMap(t =>
        t.warnings.filter(w => w.mes != null).map(w => `${w.anio}-${String(w.mes).padStart(2, '0')}`)
      );
      const hasHistorico = filtered.some(t => t.warnings.some(w => w.mes == null));

      const minKey = desdeStr || (dataMonths.length ? [...dataMonths].sort()[0] : null);
      const maxKey = hastaStr || (dataMonths.length ? [...dataMonths].sort().at(-1) : null);

      let monthKeys = [];
      if (minKey && maxKey) {
        let [y, m] = minKey.split('-').map(Number);
        const [maxY, maxM] = maxKey.split('-').map(Number);
        while (y < maxY || (y === maxY && m <= maxM)) {
          monthKeys.push(`${y}-${String(m).padStart(2, '0')}`);
          m++; if (m > 12) { m = 1; y++; }
        }
      }
      if (hasHistorico) monthKeys = ['null-null', ...monthKeys];

      if (!monthKeys.length) {
        Plotly.purge(containerId);
        el.innerHTML = '<div class="empty" style="padding:30px">Sin datos</div>';
        return;
      }

      // ── Eje X multicategoría + badges de categoría ──
      const xWec = [], xMes = [];
      const annotations = [];
      let xPos = 0;

      for (const t of filtered) {
        for (const key of monthKeys) {
          const label = key === 'null-null' ? 'Histór.' : (() => {
            const [yr, mo] = key.split('-');
            return mesLabel(parseInt(mo), parseInt(yr));
          })();
          xWec.push(t.turbina_codigo);
          xMes.push(label);
        }

        const center = xPos + (monthKeys.length - 1) / 2;
        const catColor = CAT_COLORS[t[catKey]] || CAT_COLORS.ND;
        annotations.push({
          x: center,
          y: -0.3,
          xref: 'x',
          yref: 'paper',
          text: `<b>${t[catKey]}</b>`,
          showarrow: false,
          bgcolor: catColor + '28',
          bordercolor: catColor,
          borderwidth: 1.5,
          borderpad: 6,
          font: { size: 12, color: catColor },
        });
        xPos += monthKeys.length;
      }

      // ── Trazas por tipo de warning ──
      const tiposSet = [...new Set(filtered.flatMap(t => t.warnings.map(w => w.tipo)))].sort();
      const colorMap = {};
      tiposSet.forEach((tp, i) => { colorMap[tp] = TYPE_COLORS[i % TYPE_COLORS.length]; });

      const traces = tiposSet.map(tipo => {
        const y = [];
        for (const t of filtered) {
          for (const key of monthKeys) {
            const mes  = key === 'null-null' ? null : parseInt(key.split('-')[1]);
            const anio = key === 'null-null' ? null : parseInt(key.split('-')[0]);
            const sum = t.warnings
              .filter(w => w.tipo === tipo && w.mes === mes && w.anio === anio)
              .reduce((s, w) => s + w.cantidad, 0);
            y.push(sum);
          }
        }
        return { x: [xWec, xMes], y, type: 'bar', name: tipo, marker: { color: colorMap[tipo] } };
      });

      const base = plotlyLayout({ margin: { t: 4, r: 12, b: 130, l: 40 } });
      const layout = {
        ...base,
        xaxis: {
          ...base.xaxis,
          tickangle: monthKeys.length > 8 ? -40 : 0,
        },
        barmode: 'stack',
        showlegend: true,
        legend: {
          bgcolor: 'transparent', bordercolor: 'transparent',
          font: { size: 10, color: '#dde3f0' },
          orientation: 'h', y: -0.57, x: 0,
        },
        annotations,
      };
      Plotly.react(containerId, traces, layout, plotlyConfig);
    }

    // ── MAPA ESTADO ───────────────────────────────────────────

    async function loadMapa() {
      const el = document.getElementById('mapa-content');
      el.innerHTML = '<div class="loading">Cargando...</div>';

      const res = await fetch(`${API}/mapa-estado/${parqueActual.codigo}`);
      const data = await res.json();

      const cards = data.turbinas.map(t => {
        const insp = t.ultima_inspeccion;
        const del = insp?.categoria_delantera || 'ND';
        const tras = insp?.categoria_trasera || 'ND';
        return `
          <div class="turbina-card" onclick="selectTurbina(${t.id}, '${t.codigo}')">
            <div class="t-code">${t.codigo}</div>
            <div class="t-badges">
              <div class="t-badge">
                <div class="t-dot ${dotClass(del)}">${del}</div>
                <div class="t-dot-label">Del</div>
              </div>
              <div class="t-badge">
                <div class="t-dot ${dotClass(tras)}">${tras}</div>
                <div class="t-dot-label">Tras</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      el.innerHTML = `<div class="turbinas-grid">${cards}</div>`;
    }

    // ── POR TURBINA ───────────────────────────────────────────

    async function loadTurbinasSidebar() {
      const sidebar = document.getElementById('turbina-sidebar');
      sidebar.innerHTML = '<div class="loading">Cargando...</div>';

      const res = await fetch(`${API}/mapa-estado/${parqueActual.codigo}`);
      const data = await res.json();

      sidebar.innerHTML = data.turbinas.map(t => {
        const insp = t.ultima_inspeccion;
        const del = insp?.categoria_delantera || 'ND';
        const tras = insp?.categoria_trasera || 'ND';
        const worst = worstCat(del, tras);
        const color = CAT_COLORS[worst] || CAT_COLORS.ND;
        return `
          <div class="sidebar-item" id="sidebar-${t.id}"
               onclick="selectTurbina(${t.id}, '${t.codigo}')">
            <span>${t.codigo}</span>
            <div class="sidebar-dot ${dotClass(worst)}"
                 style="background:${color}20; color:${color}; border:1px solid ${color}50">
              ${worst}
            </div>
          </div>
        `;
      }).join('');
    }

    async function selectTurbina(id, codigo) {
      // Switch to turbina tab if not already
      if (getActiveTab() !== 'turbina') {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelector('[data-tab="turbina"]').classList.add('active');
        document.getElementById('tab-turbina').classList.add('active');
        await loadTurbinasSidebar();
      }

      // Mark active
      document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
      const si = document.getElementById(`sidebar-${id}`);
      if (si) { si.classList.add('active'); si.scrollIntoView({ block: 'nearest' }); }

      const detail = document.getElementById('turbina-detail');
      detail.innerHTML = '<div class="loading">Cargando...</div>';

      const res = await fetch(`${API}/turbina/${id}`);
      const d = await res.json();
      const { turbina, inspecciones, warnings_por_mes, warnings_por_tipo } = d;
      const ultima = inspecciones[0];

      // Guarda turbina activa para recargar despues de editar
      turbinaActivaId = id;
      turbinaActivaCodigo = codigo;

      // Guarda datos crudos para el filtro de fecha
      turbinaDataRaw = { warnings_por_mes, warnings_por_tipo, inspecciones };
      const rango = rangoStr([...warnings_por_mes, ...warnings_por_tipo]);

      const totalWarnings = warnings_por_tipo.reduce((s, w) => s + w.cantidad, 0);
      const topTipos = agregarPorTipo(warnings_por_tipo).sort((a, b) => b.total - a.total).slice(0, 4);

      function renderTablaInspecciones(inspList) {
        if (inspList.length === 0) return '<div class="empty">Sin inspecciones registradas.</div>';
        const rows = inspList.map(i => `
          <tr id="insp-row-${i.id}">
            <td>${i.fecha}</td>
            <td>${i.tipo_evento}</td>
            <td><span class="${catClass(i.categoria_delantera)}" style="font-weight:600">${i.categoria_delantera}</span></td>
            <td><span class="${catClass(i.categoria_trasera)}" style="font-weight:600">${i.categoria_trasera}</span></td>
            <td style="color:var(--muted)">${i.comentarios || '—'}</td>
            <td style="white-space:nowrap">
              <button class="btn-revertir" onclick="editarInspeccion(${i.id}, '${i.tipo_evento}', '${i.categoria_delantera}', '${i.categoria_trasera}', '${i.comentarios || ''}')">Editar</button>
              <button class="btn-revertir" style="margin-left:4px" onclick="eliminarInspeccion(${i.id})">Eliminar</button>
            </td>
          </tr>
        `).join('');
        return `
          <table class="insp-table">
            <thead>
              <tr>
                <th>Fecha</th><th>Evento</th>
                <th>Del</th><th>Tras</th><th>Comentarios</th><th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      detail.innerHTML = `
        <div class="t-status-header">
          <div class="t-status-name">${turbina.codigo}</div>
          <span class="t-warn-total">${totalWarnings} warnings</span>
          ${ultima ? `
            <div class="t-status-badge">
              Del <strong class="${catClass(ultima.categoria_delantera)}">${ultima.categoria_delantera}</strong>
            </div>
            <div class="t-status-badge">
              Tras <strong class="${catClass(ultima.categoria_trasera)}">${ultima.categoria_trasera}</strong>
            </div>
          ` : ''}
          ${topTipos.map((t, i) => `<span class="t-tipo-pill" style="color:${TYPE_COLORS[i]};border-color:${TYPE_COLORS[i]}40">${abrevTipo(t.tipo)} ${t.total}</span>`).join('')}
          ${ultima ? `<div class="t-status-date">Última inspección: ${ultima.fecha}</div>` : `<span style="color:var(--muted); font-size:13px">Sin inspecciones</span>`}
        </div>

        ${filterBarHTML('filter-desde-turbina', 'filter-hasta-turbina', rango.min, rango.max)}

        <div class="chart-box">
          <div class="chart-title">Warnings mes a mes — por tipo</div>
          <div id="ct-mes" style="height:270px"></div>
        </div>

        <div class="turbina-bottom-grid">
          <div class="chart-box">
            <div class="chart-title">Tipos de warnings</div>
            <div id="ct-tipo" style="height:200px"></div>
          </div>
          <div class="chart-box">
            <div class="chart-title">Historial inspecciones y mantenimiento</div>
            <div id="tabla-inspecciones">${renderTablaInspecciones(inspecciones)}</div>
          </div>
        </div>
      `;

      renderTurbinaCharts('', '');
    }

    function renderTurbinaCharts(desdeStr, hastaStr) {
      if (!turbinaDataRaw) return;
      const { warnings_por_mes, warnings_por_tipo, inspecciones } = turbinaDataRaw;

      const mesEl  = document.getElementById('ct-mes');
      const tipoEl = document.getElementById('ct-tipo');
      if (!mesEl || !tipoEl) return;

      const mesFiltrado = rellenarMeses(filtrarPorRango(warnings_por_mes, desdeStr, hastaStr), 'cantidad');
      const todoTipo    = filtrarPorRango(warnings_por_tipo, desdeStr, hastaStr);
      const tipoChart   = todoTipo.filter(w => w.mes != null && w.anio != null);

      // ── Breakdown horizontal (bottom-left) ───────────────────
      const tipoAgr = agregarPorTipo(todoTipo);
      if (tipoAgr.length > 0) {
        Plotly.react(tipoEl, [{
          y: tipoAgr.map(w => w.tipo),
          x: tipoAgr.map(w => w.total),
          type: 'bar', orientation: 'h',
          marker: { color: tipoAgr.map((_, i) => TYPE_COLORS[i % TYPE_COLORS.length]) }
        }], plotlyLayout({ margin: { t: 8, r: 12, b: 30, l: 155 } }), plotlyConfig);
      } else {
        Plotly.purge(tipoEl);
        tipoEl.innerHTML = '<div class="empty" style="padding:30px">Sin warnings</div>';
      }

      // ── Stacked chart (main, top) ─────────────────────────────
      if (mesFiltrado.length === 0) {
        Plotly.purge(mesEl);
        mesEl.innerHTML = '<div class="empty" style="padding:30px">Sin warnings</div>';
        return;
      }

      const xLabels  = mesFiltrado.map(m => mesLabel(m.mes, m.anio));
      const tiposSet = [...new Set(tipoChart.map(w => w.tipo))].sort();

      let traces;
      if (tiposSet.length > 0) {
        const colorMap = {};
        tiposSet.forEach((t, i) => { colorMap[t] = TYPE_COLORS[i % TYPE_COLORS.length]; });
        traces = tiposSet.map(tipo => ({
          x: xLabels,
          y: mesFiltrado.map(m =>
            tipoChart
              .filter(w => w.tipo === tipo && w.mes === m.mes && w.anio === m.anio)
              .reduce((s, w) => s + w.cantidad, 0)
          ),
          type: 'bar',
          name: tipo,
          marker: { color: colorMap[tipo] },
        }));
        // Fill remainder for months without tipo granularity
        const accountedY = mesFiltrado.map((m, idx) =>
          traces.reduce((s, tr) => s + (tr.y[idx] || 0), 0)
        );
        const gapY = mesFiltrado.map((m, idx) => Math.max(0, m.cantidad - accountedY[idx]));
        if (gapY.some(v => v > 0)) {
          traces.push({
            x: xLabels, y: gapY,
            type: 'bar', name: 'Sin desglose',
            marker: { color: '#3d4a5c' }, showlegend: true,
          });
        }
      } else {
        traces = [{
          x: xLabels,
          y: mesFiltrado.map(m => m.cantidad),
          type: 'bar',
          name: 'Warnings',
          marker: { color: '#38bdf8', opacity: 0.85 },
        }];
      }

      // Total below each bar
      const totAnnotations = mesFiltrado
        .filter(m => m.cantidad > 0)
        .map(m => ({
          x: mesLabel(m.mes, m.anio),
          y: 0, yref: 'y', yanchor: 'top', yshift: -14,
          text: String(m.cantidad),
          showarrow: false,
          font: { color: '#7b869c', size: 10, family: 'Space Grotesk, sans-serif' },
        }));

      // Vertical dashed lines for inspection events
      const shapes = [];
      const inspAnnotations = [];
      (inspecciones || []).forEach(insp => {
        if (!insp.fecha) return;
        const parts = insp.fecha.split('-');
        const label = mesLabel(parseInt(parts[1]), parseInt(parts[0]));
        if (!xLabels.includes(label)) return;
        shapes.push({
          type: 'line',
          x0: label, x1: label, y0: 0, y1: 1, yref: 'paper',
          line: { color: '#22c55e', width: 1.5, dash: 'dash' }
        });
        inspAnnotations.push({
          x: label, y: 0.97, yref: 'paper', xanchor: 'left',
          text: insp.tipo_evento,
          showarrow: false, textangle: -90,
          font: { color: '#22c55e', size: 9, family: 'Inter, sans-serif' },
        });
      });

      const layout = {
        ...plotlyLayout({ margin: { t: 8, r: 12, b: 56, l: 40 } }),
        barmode: 'stack',
        shapes,
        annotations: [...totAnnotations, ...inspAnnotations],
        showlegend: tiposSet.length > 1,
        legend: {
          bgcolor: 'transparent', bordercolor: 'transparent',
          font: { size: 10, color: '#dde3f0' },
          orientation: 'h', y: -0.28, x: 0,
        },
      };

      Plotly.react('ct-mes', traces, layout, plotlyConfig);
    }

    // ── EDICION INSPECCIONES ─────────────────────────────────

    const CATS = ['A','B','C','D','ND'];

    function editarInspeccion(id, tipoEvento, catDel, catTras, comentarios) {
      const row = document.getElementById(`insp-row-${id}`);
      if (!row) return;

      const opsCat = CATS.map(c => `<option value="${c}">${c}</option>`).join('');

      row.innerHTML = `
        <td style="color:var(--muted); font-size:12px">${row.querySelector('td').textContent}</td>
        <td><input id="edit-tipo-${id}" class="form-select" style="min-width:160px" value="${tipoEvento}"></td>
        <td>
          <select id="edit-del-${id}" class="form-select" style="width:70px">${opsCat}</select>
        </td>
        <td>
          <select id="edit-tras-${id}" class="form-select" style="width:70px">${opsCat}</select>
        </td>
        <td><input id="edit-com-${id}" class="form-select" style="min-width:120px" value="${comentarios}"></td>
        <td style="white-space:nowrap">
          <button class="btn-primary" style="width:auto; padding:4px 12px; font-size:12px" onclick="guardarInspeccion(${id})">Guardar</button>
          <button class="btn-revertir" style="margin-left:4px" onclick="selectTurbina(turbinaActivaId, turbinaActivaCodigo)">Cancelar</button>
        </td>
      `;

      // Set selected values after rendering
      document.getElementById(`edit-del-${id}`).value = catDel;
      document.getElementById(`edit-tras-${id}`).value = catTras;
    }

    async function guardarInspeccion(id) {
      const tipo = document.getElementById(`edit-tipo-${id}`).value.trim();
      const del = document.getElementById(`edit-del-${id}`).value;
      const tras = document.getElementById(`edit-tras-${id}`).value;
      const com = document.getElementById(`edit-com-${id}`).value.trim();

      if (!tipo) { alert('El tipo de evento no puede estar vacío.'); return; }

      const body = {
        tipo_evento: tipo,
        categoria_delantera: del,
        categoria_trasera: tras,
        comentarios: com || null,
      };

      const res = await fetch(`${API}/inspeccion/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (res.ok) {
        // Recarga el detalle de la turbina para reflejar el cambio
        await selectTurbina(turbinaActivaId, turbinaActivaCodigo);
      } else {
        const data = await res.json();
        alert(`Error al guardar: ${data.detail}`);
      }
    }

    async function eliminarInspeccion(id) {
      if (!confirm(`Eliminar esta inspección? Esta acción no se puede deshacer.`)) return;

      const res = await fetch(`${API}/inspeccion/${id}`, { method: 'DELETE' });

      if (res.ok) {
        await selectTurbina(turbinaActivaId, turbinaActivaCodigo);
      } else {
        const data = await res.json();
        alert(`Error al eliminar: ${data.detail}`);
      }
    }

    // ── ADMIN ─────────────────────────────────────────────────

    function onTipoCambio() {
      const tipo = document.getElementById('admin-tipo').value;
      const selectParque = document.getElementById('admin-parque');
      if (tipo === 'seed_warnings') {
        selectParque.value = 'PSP';
        selectParque.disabled = true;
      } else {
        selectParque.disabled = false;
      }
    }

    async function loadAdmin() {
      const sel = document.getElementById('admin-parque');
      if (sel.options.length === 0) {
        parques.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.codigo;
          opt.textContent = p.nombre;
          sel.appendChild(opt);
        });
        sel.value = parqueActual.codigo;
      }
      await loadCargas();
    }

    async function loadCargas() {
      const codigo = document.getElementById('admin-parque')?.value || parqueActual.codigo;
      const el = document.getElementById('admin-cargas');
      el.innerHTML = '<div class="loading">Cargando...</div>';

      const res = await fetch(`${API}/admin/cargas/${codigo}`);
      const cargas = await res.json();

      if (cargas.length === 0) {
        el.innerHTML = '<div class="empty">Sin cargas registradas para este parque.</div>';
        return;
      }

      const rows = cargas.map(c => {
        const fecha = c.fecha_carga ? c.fecha_carga.replace('T', ' ').slice(0, 16) : '—';
        const puedeRevertir = c.estado === 'exitosa';
        return `
          <tr>
            <td style="color:var(--muted); font-size:12px">#${c.id}</td>
            <td>${c.tipo_archivo}</td>
            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:12px">${c.nombre_archivo}</td>
            <td style="color:var(--muted); font-size:12px">${fecha}</td>
            <td>${c.registros_insertados ?? '—'}</td>
            <td><span class="estado-badge estado-${c.estado}">${c.estado}</span></td>
            <td>${puedeRevertir ? `<button class="btn-revertir" onclick="revertirCarga(${c.id})">Revertir</button>` : '—'}</td>
          </tr>
        `;
      }).join('');

      el.innerHTML = `
        <table class="cargas-table">
          <thead>
            <tr>
              <th>ID</th><th>Tipo</th><th>Archivo</th>
              <th>Fecha</th><th>Registros</th><th>Estado</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function subirArchivo() {
      const archivo = document.getElementById('admin-archivo').files[0];
      const tipo = document.getElementById('admin-tipo').value;
      const codigo = document.getElementById('admin-parque').value;
      const feedback = document.getElementById('admin-feedback');
      const btn = document.getElementById('admin-submit');

      if (!archivo) {
        feedback.className = 'form-feedback err';
        feedback.textContent = 'Seleccioná un archivo antes de cargar.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Cargando...';
      feedback.className = 'form-feedback';
      feedback.textContent = '';

      const form = new FormData();
      form.append('archivo', archivo);
      form.append('codigo_parque', codigo);
      form.append('tipo_carga', tipo);

      try {
        const res = await fetch(`${API}/admin/cargar`, { method: 'POST', body: form });
        const data = await res.json();

        if (res.ok) {
          feedback.className = 'form-feedback ok';
          feedback.textContent = `Carga exitosa — ${data.registros_insertados ?? ''} registros insertados (ID #${data.carga_id})`;
          document.getElementById('admin-archivo').value = '';
          await loadCargas();
        } else {
          feedback.className = 'form-feedback err';
          feedback.textContent = `Error: ${data.detail}`;
        }
      } catch (e) {
        feedback.className = 'form-feedback err';
        feedback.textContent = 'No se pudo conectar con la API.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cargar';
      }
    }

    async function revertirCarga(id) {
      if (!confirm(`Revertir la carga #${id}? Se eliminaran todos sus registros.`)) return;

      const res = await fetch(`${API}/admin/carga/${id}`, { method: 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        await loadCargas();
      } else {
        alert(`Error al revertir: ${data.detail}`);
      }
    }

    init();
  </script>
</body>
</html>
