<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rodamientos — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script>const DATA = __DASHBOARD_DATA__;</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F4F4F4;
      --surface: #FFFFFF;
      --surface-2: #F0F0F0;
      --border: #E0E0E0;
      --text: #1A1A1A;
      --muted: #737373;
      --accent: #E41714;

      --cat-a:  #16A34A;
      --cat-b:  #D97706;
      --cat-c:  #EA580C;
      --cat-d:  #DC2626;
      --cat-nd: #9CA3AF;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────── */
    .header {
      flex-shrink: 0; background: var(--surface);
      border-bottom: 3px solid var(--accent);
      padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .header-logo img { height: 40px; display: block; }
    .header-right { text-align: right; }
    .header-parque {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--text); letter-spacing: -0.02em;
    }
    .header-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── TABS ───────────────────────────────────── */
    .tabs-nav {
      flex-shrink: 0; display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 28px; background: var(--surface);
    }
    .tab-btn {
      padding: 12px 18px; border: none; background: transparent;
      color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── TAB PANELS ─────────────────────────────── */
    .tab-panels { flex: 1; overflow: hidden; position: relative; }
    .tab-panel { display: none; height: 100%; overflow-y: auto; padding: 20px 28px; }
    .tab-panel.active { display: block; }
    #tab-turbina { overflow: hidden; padding: 14px 16px; }

    /* ── UTILITIES ──────────────────────────────── */
    .section-label {
      font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    .cat-a { color: var(--cat-a); } .cat-b { color: var(--cat-b); }
    .cat-c { color: var(--cat-c); } .cat-d { color: var(--cat-d); } .cat-nd { color: var(--cat-nd); }

    /* ── COUNTER CARDS ──────────────────────────── */
    .counters-row { margin-bottom: 18px; }
    .counters-group { display: flex; gap: 10px; }
    .counter-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 18px; flex: 1; border-left-width: 3px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .counter-card .count { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .counter-card .label { font-size: 12px; color: var(--muted); }
    .cc-a { border-left-color: var(--cat-a); } .cc-b { border-left-color: var(--cat-b); }
    .cc-c { border-left-color: var(--cat-c); } .cc-d { border-left-color: var(--cat-d); }

    /* ── CHARTS ─────────────────────────────────── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .chart-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .chart-title { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text); }

    /* ── MAPA GRID ──────────────────────────────── */
    .turbinas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .turbina-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .turbina-card:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(228,23,20,.15); }
    .t-code { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
    .t-badges { display: flex; gap: 6px; }
    .t-badge { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .t-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700;
    }
    .da { background: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0; }
    .db { background: #FEF9C3; color: #A16207; border: 1px solid #FDE68A; }
    .dc { background: #FFEDD5; color: #C2410C; border: 1px solid #FED7AA; }
    .dd { background: #FEE2E2; color: #B91C1C; border: 1px solid #FECACA; }
    .dnd { background: #F3F4F6; color: #6B7280; border: 1px solid #E5E7EB; }
    .t-dot-label { font-size: 10px; color: var(--muted); }

    /* ── POR TURBINA ─────────────────────────────── */
    .turbina-layout { display: grid; grid-template-columns: 210px 1fr; gap: 14px; height: 100%; }
    .turbina-sidebar {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      overflow-y: auto; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .sidebar-item {
      padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Space Grotesk', sans-serif; font-size: 13px;
      transition: background 0.1s; border-left: 3px solid transparent;
    }
    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item:hover { background: var(--surface-2); }
    .sidebar-item.active { background: #FFF5F5; border-left-color: var(--accent); color: var(--accent); }
    .sidebar-dot {
      width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center;
    }
    .turbina-detail { display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .t-status-header {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 18px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .t-status-name { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }
    .t-status-badge {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px;
    }
    .t-status-badge strong { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; }
    .t-status-date { margin-left: auto; font-size: 12px; color: var(--muted); }
    .t-warn-total {
      font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700;
      color: var(--accent); background: rgba(228,23,20,0.06);
      border: 1px solid rgba(228,23,20,0.25); border-radius: 20px; padding: 3px 12px;
    }
    .t-tipo-pill {
      font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600;
      border-radius: 20px; padding: 3px 9px; background: var(--surface-2); border: 1px solid;
    }
    .turbina-bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── INSPECTION TABLE ────────────────────────── */
    .insp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .insp-table th {
      text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border); background: var(--surface-2);
    }
    .insp-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .insp-table tr:last-child td { border-bottom: none; }
    .insp-table tr:hover td { background: #FFF5F5; }

    /* ── FOOTER BRAND STRIPE ─────────────────────── */
    .footer-stripe {
      flex-shrink: 0; display: flex; height: 5px;
    }
    .footer-stripe div { flex: 1; }
    .fs-1 { background: #DCDCDC; }
    .fs-2 { background: #737373; }
    .fs-3 { background: #E41714; }
  </style>
</head>

  <script>
    const MESES = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const CAT_COLORS = { A:'#16A34A', B:'#D97706', C:'#EA580C', D:'#DC2626', ND:'#9CA3AF' };
    const ORDER = { D:4, C:3, B:2, A:1, ND:0 };

    function mesLabel(mes, anio) { return `${MESES[mes]} ${String(anio).slice(2)}`; }
    function dotClass(c) { return ({A:'da',B:'db',C:'dc',D:'dd'})[c] || 'dnd'; }
    function catClass(c) { return 'cat-' + (c||'nd').toLowerCase(); }
    function worstCat(a,b) { return (ORDER[a]||0) >= (ORDER[b]||0) ? a : b; }
    function abrevTipo(tipo) { return tipo.split(/[\s.]/)[0]; }
    function mKey(m, a) { return a * 100 + m; }

    function agregarPorTipo(arr) {
      const m = {};
      arr.forEach(w => { m[w.tipo] = (m[w.tipo] || 0) + w.cantidad; });
      return Object.entries(m).map(([tipo, total]) => ({tipo, total})).sort((a,b) => a.tipo.localeCompare(b.tipo));
    }

    function rellenarMeses(mesData, campo) {
      if (!mesData.length) return [];
      const lookup = {};
      mesData.forEach(w => { lookup[mKey(w.mes, w.anio)] = w[campo]; });
      const keys = mesData.map(w => mKey(w.mes, w.anio));
      const minK = Math.min(...keys), maxK = Math.max(...keys);
      const result = [];
      let a = Math.floor(minK/100), m = minK % 100;
      while (mKey(m, a) <= maxK) {
        result.push({ mes: m, anio: a, [campo]: lookup[mKey(m, a)] || 0 });
        m++; if (m > 12) { m = 1; a++; }
      }
      return result;
    }

    // ── SVG CHARTS ────────────────────────────────

    const SVG_COLORS = ['#E41714','#2563EB','#EA580C','#D97706','#16A34A','#7C3AED','#0891B2','#BE185D'];

    function svgVBarStacked(mesData, campo, tipoData, inspecciones) {
      const filled = rellenarMeses(mesData, campo);
      if (!filled.length) return '<div class="empty">Sin datos</div>';

      const tipoConFecha = tipoData.filter(w => w.mes != null && w.anio != null);
      const tipos = [...new Set(tipoConFecha.map(w => w.tipo))].sort();
      const colorMap = {};
      tipos.forEach((t, i) => { colorMap[t] = SVG_COLORS[i % SVG_COLORS.length]; });

      const n = filled.length;
      const max = Math.max(...filled.map(w => w[campo]), 1);
      const ticks = 4;
      const step = Math.ceil(max / ticks) || 1;
      const niceMax = step * ticks;
      const barW = Math.max(16, Math.min(46, Math.floor(520 / n) - 8));
      const gap = 6;
      const padL = 36, padR = 12, padT = 10, padB = n > 8 ? 54 : 38;
      const plotW = n * (barW + gap);
      const W = Math.max(300, padL + plotW + padR);
      const H = 200;
      const plotH = H - padT - padB;

      const xIdx = {};
      filled.forEach((m, i) => { xIdx[mKey(m.mes, m.anio)] = i; });

      let hasGap = false;
      let o = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">`;

      for (let t = 0; t <= ticks; t++) {
        const v = step * t;
        const y = padT + plotH * (1 - v/niceMax);
        o += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#E0E0E0" stroke-width="1"/>`;
        o += `<text x="${padL-5}" y="${y+4}" text-anchor="end" font-size="10" fill="#9CA3AF">${v}</text>`;
      }

      filled.forEach((m, i) => {
        const x = padL + i*(barW+gap) + gap/2;
        const total = m[campo];
        let yTop = padT + plotH;

        tipos.forEach(tipo => {
          const e = tipoConFecha.find(w => w.tipo === tipo && w.mes === m.mes && w.anio === m.anio);
          const val = e ? e.cantidad : 0;
          if (val <= 0) return;
          const bh = (val / niceMax) * plotH;
          yTop -= bh;
          o += `<rect x="${x}" y="${yTop}" width="${barW}" height="${bh}" fill="${colorMap[tipo]}" opacity="0.88" rx="1"/>`;
        });

        const accounted = tipos.reduce((s, tipo) => {
          const e = tipoConFecha.find(w => w.tipo === tipo && w.mes === m.mes && w.anio === m.anio);
          return s + (e ? e.cantidad : 0);
        }, 0);
        const rem = Math.max(0, total - accounted);
        if (rem > 0) {
          hasGap = true;
          const bh = (rem / niceMax) * plotH;
          yTop -= bh;
          o += `<rect x="${x}" y="${yTop}" width="${barW}" height="${bh}" fill="#C0C0C0" opacity="0.65" rx="1"/>`;
        }

        const lbl = mesLabel(m.mes, m.anio);
        const lx = x + barW/2, ly = H - padB + 14;
        if (n > 8) {
          o += `<text transform="rotate(-40,${lx},${ly})" x="${lx}" y="${ly}" text-anchor="end" font-size="9" fill="#9CA3AF">${lbl}</text>`;
        } else {
          o += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="10" fill="#9CA3AF">${lbl}</text>`;
        }
        if (total > 0) {
          const ty = n > 8 ? ly + 9 : ly + 12;
          o += `<text x="${lx}" y="${ty}" text-anchor="middle" font-size="9" fill="#BFBFBF">${total}</text>`;
        } else {
          // Mes con 0 warnings: guión horizontal en la línea base + texto "0"
          const dashW = Math.round(barW * 0.55);
          const baseY = padT + plotH;
          o += `<line x1="${lx - dashW/2}" y1="${baseY}" x2="${lx + dashW/2}" y2="${baseY}" stroke="#3a4a5e" stroke-width="2.5" stroke-linecap="round"/>`;
          const ty = n > 8 ? ly + 9 : ly + 12;
          o += `<text x="${lx}" y="${ty}" text-anchor="middle" font-size="9" fill="#3a4a5e">0</text>`;
        }
      });

      (inspecciones || []).forEach(insp => {
        if (!insp.fecha) return;
        const parts = insp.fecha.split('-');
        const key = mKey(parseInt(parts[1]), parseInt(parts[0]));
        const idx = xIdx[key];
        if (idx === undefined) return;
        const x = padL + idx*(barW+gap) + gap/2 + barW/2;
        o += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+plotH}" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>`;
        o += `<text transform="rotate(-90,${x},${padT+2})" x="${x}" y="${padT+2}" text-anchor="start" font-size="8" fill="#16A34A">${insp.tipo_evento}</text>`;
      });

      o += '</svg>';

      const legendItems = tipos.map((t, i) =>
        `<span style="display:flex;align-items:center;gap:4px">
          <span style="width:10px;height:10px;background:${colorMap[t]};border-radius:2px;flex-shrink:0"></span>
          <span style="font-size:10px;color:#737373">${t}</span>
        </span>`
      );
      if (hasGap) legendItems.push(
        `<span style="display:flex;align-items:center;gap:4px">
          <span style="width:10px;height:10px;background:#C0C0C0;border-radius:2px;flex-shrink:0"></span>
          <span style="font-size:10px;color:#737373">Sin desglose</span>
        </span>`
      );
      if (legendItems.length > 1) {
        o += `<div style="display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:8px">${legendItems.join('')}</div>`;
      }
      return o;
    }

    function svgHBar(vals, labels) {
      if (!vals.length) return '<div class="empty">Sin datos</div>';
      const max = Math.max(...vals, 1);
      const barH = 22, gap = 8, padL = 148, padR = 44, padT = 6, padB = 6;
      const plotW = 280;
      const W = padL + plotW + padR;
      const H = vals.length*(barH+gap) + padT + padB;
      let o = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">`;
      vals.forEach((v, i) => {
        const y = padT + i*(barH+gap);
        const bw = (v/max)*plotW;
        const color = SVG_COLORS[i % SVG_COLORS.length];
        o += `<text x="${padL-7}" y="${y+barH/2+4}" text-anchor="end" font-size="11" fill="#737373">${labels[i]}</text>`;
        o += `<rect x="${padL}" y="${y}" width="${bw}" height="${barH}" fill="${color}" opacity="0.85" rx="2"/>`;
        o += `<text x="${padL+bw+5}" y="${y+barH/2+4}" font-size="11" fill="#1A1A1A">${v}</text>`;
      });
      return o + '</svg>';
    }

    function svgBarNoA(turbinas, catKey) {
      const CAT_COLORS_MAP = { A:'#16A34A', B:'#D97706', C:'#EA580C', D:'#DC2626', ND:'#9CA3AF' };
      const filtered = turbinas.filter(t => t[catKey] !== 'A');
      if (!filtered.length) return '<div class="empty">Todas las turbinas en Cat. A</div>';

      const tipos = [...new Set(filtered.flatMap(t => t.warnings.map(w => w.tipo)))].sort();
      const data = filtered.map(t => {
        const totals = {};
        for (const w of t.warnings) totals[w.tipo] = (totals[w.tipo] || 0) + w.cantidad;
        return { codigo: t.turbina_codigo, cat: t[catKey], totals };
      });

      const maxTotal = Math.max(1, ...data.map(d => Object.values(d.totals).reduce((s, v) => s + v, 0)));
      const BAR_W = 40, GAP = 20, H = 140, LABEL_H = 36;
      const padL = GAP;
      const W = padL + data.length * (BAR_W + GAP);
      const LEGEND_ROWS = Math.ceil(tipos.length / 3);
      const totalH = H + LABEL_H + LEGEND_ROWS * 18 + 8;

      let o = `<svg viewBox="0 0 ${Math.max(W, 540)} ${totalH}" style="width:100%;overflow:visible">`;

      data.forEach((d, i) => {
        const x = padL + i * (BAR_W + GAP);
        let yOffset = H;
        tipos.forEach((tipo, ti) => {
          const val = d.totals[tipo] || 0;
          const bh = Math.round((val / maxTotal) * H);
          if (bh > 0) {
            yOffset -= bh;
            o += `<rect x="${x}" y="${yOffset}" width="${BAR_W}" height="${bh}" fill="${SVG_COLORS[ti % SVG_COLORS.length]}" opacity="0.85" rx="1"/>`;
          }
        });
        const cx = x + BAR_W / 2;
        const catColor = CAT_COLORS_MAP[d.cat] || CAT_COLORS_MAP.ND;
        o += `<text x="${cx}" y="${H + 14}" text-anchor="middle" font-size="10" fill="#737373">${d.codigo}</text>`;
        o += `<circle cx="${cx}" cy="${H + 27}" r="8" fill="${catColor}22" stroke="${catColor}" stroke-width="1.5"/>`;
        o += `<text x="${cx}" y="${H + 31}" text-anchor="middle" font-size="9" fill="${catColor}" font-weight="700">${d.cat}</text>`;
      });

      const legendY = H + LABEL_H + 4;
      tipos.forEach((tipo, i) => {
        const col = i % 3, row = Math.floor(i / 3);
        const lx = col * 180, ly = legendY + row * 18;
        o += `<rect x="${lx}" y="${ly}" width="10" height="10" fill="${SVG_COLORS[i % SVG_COLORS.length]}" rx="2"/>`;
        o += `<text x="${lx + 14}" y="${ly + 9}" font-size="10" fill="#737373">${tipo}</text>`;
      });

      return o + '</svg>';
    }

    // ── TABS ──────────────────────────────────────

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ── RESUMEN ───────────────────────────────────

    function renderResumen() {
      const { contadores, warnings_detalle_turbinas } = DATA.resumen;
      const cats = ['A','B','C','D'];

      function counterGroup(obj, titulo) {
        return `<div class="counters-row">
          <div class="section-label">${titulo}</div>
          <div class="counters-group">
            ${cats.map(c => `
              <div class="counter-card cc-${c.toLowerCase()}">
                <div class="count cat-${c.toLowerCase()}">${obj[c]||0}</div>
                <div class="label">Cat. ${c}</div>
              </div>`).join('')}
          </div>
        </div>`;
      }

      const det = warnings_detalle_turbinas || [];

      document.getElementById('resumen-content').innerHTML = `
        ${counterGroup(contadores.delantera, 'Rodamiento Delantero')}
        ${counterGroup(contadores.trasera,   'Rodamiento Trasero')}
        <div style="margin-top:8px">
          <div class="chart-box" style="margin-bottom:12px">
            <div class="chart-title">Rodamiento Delantero ≠ A — Warnings histórico por tipo</div>
            ${svgBarNoA(det, 'categoria_delantera')}
          </div>
          <div class="chart-box">
            <div class="chart-title">Rodamiento Trasero ≠ A — Warnings histórico por tipo</div>
            ${svgBarNoA(det, 'categoria_trasera')}
          </div>
        </div>`;
    }

    // ── MAPA ESTADO ───────────────────────────────

    function renderMapa() {
      const cards = DATA.turbinas.map(t => {
        const insp = t.ultima_inspeccion;
        const del  = insp?.categoria_delantera || 'ND';
        const tras = insp?.categoria_trasera   || 'ND';
        return `<div class="turbina-card" onclick="goToTurbina(${t.id})">
          <div class="t-code">${t.codigo}</div>
          <div class="t-badges">
            <div class="t-badge">
              <div class="t-dot ${dotClass(del)}">${del}</div>
              <div class="t-dot-label">Del</div>
            </div>
            <div class="t-badge">
              <div class="t-dot ${dotClass(tras)}">${tras}</div>
              <div class="t-dot-label">Tras</div>
            </div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('mapa-content').innerHTML = `<div class="turbinas-grid">${cards}</div>`;
    }

    // ── SIDEBAR ───────────────────────────────────

    function renderSidebar() {
      document.getElementById('turbina-sidebar').innerHTML = DATA.turbinas.map(t => {
        const insp = t.ultima_inspeccion;
        const del  = insp?.categoria_delantera || 'ND';
        const tras = insp?.categoria_trasera   || 'ND';
        const worst = worstCat(del, tras);
        const color = CAT_COLORS[worst] || CAT_COLORS.ND;
        return `<div class="sidebar-item" id="sidebar-${t.id}" onclick="renderTurbinaDetail(${t.id})">
          <span>${t.codigo}</span>
          <div class="sidebar-dot" style="background:${color}18;color:${color};border:1px solid ${color}40">${worst}</div>
        </div>`;
      }).join('');
    }

    // ── TURBINA DETAIL ────────────────────────────

    function renderTurbinaDetail(id) {
      document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
      const si = document.getElementById(`sidebar-${id}`);
      if (si) { si.classList.add('active'); si.scrollIntoView({ block:'nearest' }); }

      const t = DATA.turbinas.find(x => x.id === id);
      if (!t) return;
      const ultima = t.inspecciones[0];

      const totalWarnings = t.warnings_por_tipo.reduce((s, w) => s + w.cantidad, 0);
      const topTipos = agregarPorTipo(t.warnings_por_tipo).sort((a, b) => b.total - a.total).slice(0, 4);
      const tipoAgr  = agregarPorTipo(t.warnings_por_tipo);

      const tablaRows = t.inspecciones.map(i => `<tr>
        <td>${i.fecha}</td>
        <td>${i.tipo_evento}</td>
        <td><span class="${catClass(i.categoria_delantera)}" style="font-weight:600">${i.categoria_delantera}</span></td>
        <td><span class="${catClass(i.categoria_trasera)}" style="font-weight:600">${i.categoria_trasera}</span></td>
        <td style="color:var(--muted)">${i.comentarios || '—'}</td>
      </tr>`).join('');

      document.getElementById('turbina-detail').innerHTML = `
        <div class="t-status-header">
          <div class="t-status-name">${t.codigo}</div>
          <span class="t-warn-total">${totalWarnings} warnings</span>
          ${ultima ? `
            <div class="t-status-badge">Del <strong class="${catClass(ultima.categoria_delantera)}">${ultima.categoria_delantera}</strong></div>
            <div class="t-status-badge">Tras <strong class="${catClass(ultima.categoria_trasera)}">${ultima.categoria_trasera}</strong></div>
          ` : ''}
          ${topTipos.map((tp, i) => `<span class="t-tipo-pill" style="color:${SVG_COLORS[i]};border-color:${SVG_COLORS[i]}40">${abrevTipo(tp.tipo)} ${tp.total}</span>`).join('')}
          ${ultima ? `<div class="t-status-date">Última inspección: ${ultima.fecha}</div>` : `<span style="color:var(--muted);font-size:13px">Sin inspecciones</span>`}
        </div>
        <div class="chart-box">
          <div class="chart-title">Warnings mes a mes — por tipo</div>
          ${svgVBarStacked(t.warnings_por_mes, 'cantidad', t.warnings_por_tipo, t.inspecciones)}
        </div>
        <div class="turbina-bottom-grid">
          <div class="chart-box">
            <div class="chart-title">Tipos de warnings</div>
            ${svgHBar(tipoAgr.map(w => w.total), tipoAgr.map(w => w.tipo))}
          </div>
          <div class="chart-box">
            <div class="chart-title">Historial inspecciones y mantenimiento</div>
            ${t.inspecciones.length > 0 ? `
              <table class="insp-table">
                <thead><tr>
                  <th>Fecha</th><th>Evento</th><th>Del</th><th>Tras</th><th>Comentarios</th>
                </tr></thead>
                <tbody>${tablaRows}</tbody>
              </table>` : '<div class="empty">Sin inspecciones.</div>'}
          </div>
        </div>`;
    }

    function goToTurbina(id) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-tab="turbina"]').classList.add('active');
      document.getElementById('tab-turbina').classList.add('active');
      renderTurbinaDetail(id);
    }

    // ── INIT ──────────────────────────────────────

    function init() {
      document.getElementById('header-parque').textContent =
        `Parque ${DATA.parque.nombre} — Rodamientos`;
      document.getElementById('header-meta').textContent =
        `Generado: ${DATA.generado}`;
      renderResumen();
      renderMapa();
      renderSidebar();
      if (DATA.turbinas.length > 0) renderTurbinaDetail(DATA.turbinas[0].id);
    }

    init();
  </script>
</body>
</html>
